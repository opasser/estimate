@defer (when processingData) {
  <mat-card class="form-wrapper">
    <mat-card-header class="card-header">
      <mat-card-title>
        Processing: {{processingData.performerName}} / {{ processingData.performerId}}
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="content">
      <div class="amount-container">
        <div class="amount-item">Amount:</div>
        <div class="amount-item"> {{processingData.amount | currency}} </div>
      </div>

      <form class="example-form">
        <mat-form-field class="comment-container">
          <mat-label>Comment</mat-label>
          <textarea matInput [(ngModel)]="comment" name="comment"></textarea>
        </mat-form-field>
      </form>
    </mat-card-content>

    <mat-card-actions class="action-group" align="end">
      <button mat-button (click)=onSubmit() type="submit">Submit</button>
    </mat-card-actions>
  </mat-card>
}

  <div class="row justify-content-between">
    <mat-form-field class="col-5">
      <mat-label>Choose a video device</mat-label>
      <mat-select [formControl]="videoDeviceForm()">
        @for (device of videoDevices(); track device.deviceId) {
          <mat-option [value]="device">{{device.label}}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field class="col-5">
      <mat-label>Choose a audio device</mat-label>
      <mat-select [formControl]="audioDeviceForm()">
        @for (device of audioDevices(); track device.deviceId) {
          <mat-option [value]="device">{{device.label}}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </div>
